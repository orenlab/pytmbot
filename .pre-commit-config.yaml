default_install_hook_types: [ pre-commit, pre-push ]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-merge-conflict
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-added-large-files
      - id: check-toml
      - id: check-yaml

  - repo: local
    hooks:
      - id: ruff-format
        name: Ruff (format)
        entry: ruff format .
        language: system
        pass_filenames: false
        types: [ python ]
        stages: [ pre-commit ]

      - id: ruff-check
        name: Ruff (lint)
        entry: ruff check .
        language: system
        pass_filenames: false
        types: [ python ]
        stages: [ pre-commit ]

      - id: mypy
        name: Mypy
        entry: mypy .
        language: system
        pass_filenames: false
        types: [ python ]
        stages: [ pre-commit ]

      - id: codeclone
        name: CodeClone
        entry: codeclone
        language: system
        pass_filenames: false
        args: [ ".", "--ci" ]
        types: [ python ]
        stages: [ pre-commit ]

      - id: pytest
        name: Pytest
        entry: pytest -q
        language: system
        pass_filenames: false
        types: [ python ]
        stages: [ pre-push ]
