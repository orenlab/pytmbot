# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.
# hadoint is a Dockerfile linter written in Haskell
# that helps you build best practice Docker images.
# More details at https://github.com/hadolint/hadolint

name: Hadolint

on:
  push:
    branches: [ "**" ]
  pull_request:
  schedule:
    - cron: '34 9 * * 3'

permissions:
  contents: read

jobs:
  hadolint:
    name: Run hadolint scanning
    runs-on: ubuntu-latest
    permissions:
      contents: read # for actions/checkout to fetch code
      security-events: write # for github/codeql-action/upload-sarif to upload SARIF results
      actions: read # only required for a private repository by github/codeql-action/upload-sarif to get the Action run status
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Run hadolint
        id: hadolint
        continue-on-error: true
        run: |
          docker run --rm \
            -i \
            ghcr.io/hadolint/hadolint:v2.14.0 \
            hadolint \
            --format sarif \
            - < Dockerfile > hadolint-results.sarif

      - name: Validate hadolint SARIF
        id: hadolint_sarif
        if: always()
        run: |
          if [ ! -s hadolint-results.sarif ]; then
            echo "valid=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          python - <<'PY'
          import json
          from pathlib import Path

          json.loads(Path("hadolint-results.sarif").read_text(encoding="utf-8"))
          PY
          echo "valid=true" >> "$GITHUB_OUTPUT"

      - name: Upload analysis results to GitHub
        if: always() && steps.hadolint_sarif.outputs.valid == 'true'
        uses: github/codeql-action/upload-sarif@38697555549f1db7851b81482ff19f1fa5c4fedc
        with:
          sarif_file: hadolint-results.sarif
          category: hadolint
          wait-for-processing: true

      - name: Fail if hadolint execution failed before producing valid SARIF
        if: always() && steps.hadolint.outcome == 'failure' && steps.hadolint_sarif.outputs.valid != 'true'
        run: |
          echo "hadolint failed before producing a valid SARIF report"
          exit 1

      - name: Fail if hadolint reported issues
        if: steps.hadolint.outcome == 'failure'
        run: exit 1
