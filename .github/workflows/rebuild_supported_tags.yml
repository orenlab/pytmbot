name: CI Rebuild Specific Tags

on:
  schedule:
    - cron: '0 12 * * 1' # Every Monday at 12:00 UTC (17:00 Yekaterinburg)
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: read

jobs:
  docker:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        tag:
          - 0.3.0 # This will also be tagged as latest

    steps:
      - name: Check that tag exists
        id: check_tag
        run: |
          if git ls-remote --exit-code --tags https://github.com/orenlab/pytmbot.git "refs/tags/${{ matrix.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag ${{ matrix.tag }} exists. Continuing build."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Tag ${{ matrix.tag }} does not exist yet. Skipping build."
          fi

      - name: Set up Docker Buildx
        if: steps.check_tag.outputs.exists == 'true'
        uses: docker/setup-buildx-action@v3
        with:
          install: true
          driver-opts: |
            image=moby/buildkit:v0.24.0

      - name: Login to Docker Hub
        if: steps.check_tag.outputs.exists == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        if: steps.check_tag.outputs.exists == 'true'
        uses: docker/build-push-action@v6
        with:
          context: https://github.com/orenlab/pytmbot.git#${{ matrix.tag }}
          platforms: linux/amd64,linux/arm64
          sbom: true
          provenance: mode=max
          file: Dockerfile
          push: true
          pull: true
          target: production
          build-args: |
            COMPILE_BYTECODE=1
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            orenlab/pytmbot:${{ matrix.tag }}
            orenlab/pytmbot:latest

      - name: Skip message
        if: steps.check_tag.outputs.exists != 'true'
        run: echo "Tag ${{ matrix.tag }} is not available yet, skipping build."
