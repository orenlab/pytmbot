# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.
# hadoint is a Dockerfile linter written in Haskell
# that helps you build best practice Docker images.
# More details at https://github.com/hadolint/hadolint

name: Hadolint

on:
  push:
    branches: [ "**" ]
  pull_request:
  schedule:
    - cron: '34 9 * * 3'

permissions:
  contents: read

jobs:
  hadolint:
    name: Run hadolint scanning
    runs-on: ubuntu-latest
    permissions:
      contents: read # for actions/checkout to fetch code
      security-events: write # for github/codeql-action/upload-sarif to upload SARIF results
      actions: read # only required for a private repository by github/codeql-action/upload-sarif to get the Action run status
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Run hadolint
        id: hadolint
        continue-on-error: true
        run: |
          docker run --rm \
            -v "$PWD:/workspace:ro" \
            -w /workspace \
            ghcr.io/hadolint/hadolint:v2.14.0 \
            --format sarif \
            Dockerfile > hadolint-results.sarif

      - name: Upload analysis results to GitHub
        if: always() && hashFiles('hadolint-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@b8d3b6e8af63cde30bdc382c0bc28114f4346c88
        with:
          sarif_file: hadolint-results.sarif
          wait-for-processing: true

      - name: Fail if hadolint reported issues
        if: steps.hadolint.outcome == 'failure'
        run: exit 1
