name: CI Rebuild Current Stable Tags

on:
  schedule:
    - cron: '0 12 * * 1' # Every Monday at 12:00 UTC (17:00 Yekaterinburg)
  workflow_dispatch:

permissions:
  contents: read

env:
  DOCKER_IMAGE: orenlab/pytmbot
  STABLE_RELEASE_LINE: "0.3"

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Resolve latest stable release tag
        id: resolve
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import os
          import re
          import subprocess
          import sys
          from datetime import UTC, datetime

          release_line = os.environ["STABLE_RELEASE_LINE"]
          pattern = re.compile(rf"^v?{re.escape(release_line)}\.(\d+)$")
          output = subprocess.check_output(
              [
                  "git",
                  "ls-remote",
                  "--tags",
                  "--refs",
                  "https://github.com/orenlab/pytmbot.git",
              ],
              text=True,
          )

          latest_tag = None
          latest_sha = None
          latest_patch = -1

          for line in output.splitlines():
              sha, ref = line.split()
              tag = ref.rsplit("/", 1)[-1]
              match = pattern.fullmatch(tag)
              if match is None:
                  continue
              patch = int(match.group(1))
              if patch > latest_patch:
                  latest_patch = patch
                  latest_tag = tag
                  latest_sha = sha

          if latest_tag is None or latest_sha is None:
              print(
                  f"No stable release tag found for line {release_line}",
                  file=sys.stderr,
              )
              raise SystemExit(1)

          rebuild_date = datetime.now(UTC).strftime("%Y%m%d")
          print(f"release_tag={latest_tag}")
          print(f"release_sha={latest_sha}")
          print(f"source_ref={latest_tag}")
          print(f"line_tag={release_line}")
          print(f"rebuild_tag={release_line}-r{rebuild_date}")
          PY

      - name: Show rebuild source
        run: |
          echo "Stable line: ${{ env.STABLE_RELEASE_LINE }}"
          echo "Release tag: ${{ steps.resolve.outputs.release_tag }}"
          echo "Release sha: ${{ steps.resolve.outputs.release_sha }}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f
        with:
          install: true
          driver-opts: |
            image=moby/buildkit:v0.24.0

      - name: Login to Docker Hub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push refreshed stable image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: https://github.com/orenlab/pytmbot.git#${{ steps.resolve.outputs.source_ref }}
          platforms: linux/amd64,linux/arm64
          sbom: true
          provenance: mode=max
          file: Dockerfile
          push: true
          pull: true
          target: production
          build-args: |
            COMPILE_BYTECODE=1
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.source=https://github.com/orenlab/pytmbot
            org.opencontainers.image.version=${{ steps.resolve.outputs.release_tag }}
            org.opencontainers.image.revision=${{ steps.resolve.outputs.release_sha }}
          tags: |
            ${{ env.DOCKER_IMAGE }}:${{ steps.resolve.outputs.line_tag }}
            ${{ env.DOCKER_IMAGE }}:stable
            ${{ env.DOCKER_IMAGE }}:latest
            ${{ env.DOCKER_IMAGE }}:${{ steps.resolve.outputs.rebuild_tag }}
