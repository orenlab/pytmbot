[project]
site_name = "pyTMbot"
site_description = "Code-aligned documentation for pyTMbot"
site_url = "https://orenlab.github.io/pytmbot/"
repo_name = "orenlab/pytmbot"
repo_url = "https://github.com/orenlab/pytmbot"
docs_dir = "docs"
site_dir = "site"

nav = [
  { "Home" = "index.md" },
  { "Start Here" = [
    { "Installation" = "installation.md" },
    { "Docker Runtime" = "docker.md" },
    { "Configuration Reference" = "settings.md" },
    { "CLI Arguments" = "bot_cli_args.md" },
    { "Bot Command Reference" = "commands.md" },
  ] },
  { "Architecture And Runtime" = [
    { "Architecture" = "architecture.md" },
    { "Webhook Mode" = "webhook.md" },
    { "Health System" = "health.md" },
    { "Access Control And 2FA" = "auth_control.md" },
    { "Plugins" = "plugins.md" },
    { "Security" = "security.md" },
  ] },
  { "Operations" = [
    { "Debugging And Diagnostics" = "debug.md" },
    { "Release And Image Tag Policy" = "release_policy.md" },
    { "InfluxDB Reverse Proxy Setup" = "influxdb_host_setup.md" },
  ] },
  { "Development" = [
    { "Development And Quality Gates" = "development.md" },
    { "Roadmap" = "roadmap.md" },
  ] },
  { "Legacy" = [
    { "Installation Script Note" = "script_install.md" },
  ] },
]

[project.theme]
language = "en"
variant = "modern"
features = [
  "navigation.sections",
  "navigation.top",
  "content.code.copy",
]

[project.validation]
unresolved_references = true
unresolved_footnotes = true
unused_definitions = true
unused_footnotes = true
shadowed_definitions = true
shadowed_footnotes = true
invalid_links = true
invalid_link_anchors = true

[project.markdown_extensions.abbr]
[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.def_list]
[project.markdown_extensions.footnotes]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.tables]

[project.markdown_extensions.toc]
permalink = true

[project.markdown_extensions.pymdownx.betterem]
[project.markdown_extensions.pymdownx.caret]
[project.markdown_extensions.pymdownx.details]

[project.markdown_extensions.pymdownx.emoji]
emoji_generator = "zensical.extensions.emoji.to_svg"
emoji_index = "zensical.extensions.emoji.twemoji"

[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true

[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.keys]
[project.markdown_extensions.pymdownx.magiclink]
[project.markdown_extensions.pymdownx.mark]
[project.markdown_extensions.pymdownx.smartsymbols]

[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
  { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" },
]

[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true
combine_header_slug = true

[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true

[project.markdown_extensions.pymdownx.tilde]
